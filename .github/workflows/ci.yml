name: Docker CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  VM_HOST: ${{ secrets.VM_HOST }}
  VM_USERNAME: ${{ secrets.VM_USERNAME }}
  VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Backend image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/3tier-backend:latest
    
    - name: Build and push Frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/3tier-frontend:latest
    
    - name: Deploy to VM
      if: github.ref == 'refs/heads/main'
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          # Stop and remove existing containers
          cd /home/${{ secrets.VM_USERNAME }}/app || mkdir -p /home/${{ secrets.VM_USERNAME }}/app
          cd /home/${{ secrets.VM_USERNAME }}/app
          
          # Create docker-compose.yml
          cat > docker-compose.yml << 'EOF'
          version: '3.8'
          services:
            mongodb:
              image: mongo:latest
              container_name: mongodb
              restart: always
              volumes:
                - mongodb_data:/data/db
              networks:
                - app-network
            
            backend:
              image: ${{ secrets.DOCKER_USERNAME }}/3tier-backend:latest
              container_name: backend-api
              restart: always
              ports:
                - "5000:5000"
              environment:
                - MONGODB_URI=mongodb://mongodb:27017/dockerapp
              depends_on:
                - mongodb
              networks:
                - app-network
            
            frontend:
              image: ${{ secrets.DOCKER_USERNAME }}/3tier-frontend:latest
              container_name: frontend-nginx
              restart: always
              ports:
                - "80:80"
              depends_on:
                - backend
              networks:
                - app-network
          
          volumes:
            mongodb_data:
          
          networks:
            app-network:
              driver: bridge
          EOF
          
          # Pull latest images and restart
          docker-compose pull
          docker-compose down
          docker-compose up -d
          
          # Clean up unused images
          docker image prune -f



