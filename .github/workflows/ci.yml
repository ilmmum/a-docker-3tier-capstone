name: Docker CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Updated to v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3  # Updated to v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3  # Updated to v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Backend image
      uses: docker/build-push-action@v6  # Updated to v6
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/3tier-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/3tier-backend:${{ github.sha }}
    
    - name: Build and push Frontend image
      uses: docker/build-push-action@v6  # Updated to v6
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/3tier-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/3tier-frontend:${{ github.sha }}
    
    - name: Verify Docker images
      run: |
        echo "✅ Build and push completed successfully!"
        echo "📦 Backend image: ${{ secrets.DOCKER_USERNAME }}/3tier-backend:latest"
        echo "📦 Frontend image: ${{ secrets.DOCKER_USERNAME }}/3tier-frontend:latest"
        echo "🔍 Check at: https://hub.docker.com/u/${{ secrets.DOCKER_USERNAME }}"



