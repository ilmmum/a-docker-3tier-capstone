

services:
  
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
      build: ./backend
      ports:
        - "3000:3000" 
      depends_on:
        - db

  db:
      image: mongo:7
      container_name: mongodb
      ports:
        - "27017:27017"
